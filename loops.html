<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

        <h2> print druit using loop</h2>
        <p id="demo"> </p>

</body>
<script>

    var fruits =["apple","orange","grape","watermelon","jack fruit","banana"];

    var text="";
    var i;
    for(i = 0;i < 6 ; i++){

        text = text + fruits[i] +"<br>";
    }

    document.getElementById("demo").innerHTML = text ;
</script>
</html>
